<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart & Go</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1117;font-family:Georgia,serif;color:#f0ede6;min-height:100vh}
  input,select,button{font-family:Georgia,serif}
  input::placeholder{color:#4a6b4e}
  select option{background:#1a2a1a;color:#f0ede6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "grocery_app_data";
const defaultSections = ["Produce","Dairy","Meat","Bakery","Frozen","Pantry","Other"];

function generateId() {
  return Math.random().toString(36).substr(2,9) + Date.now().toString(36);
}

function App() {
  const [items, setItems] = useState([]);
  const [priceLog, setPriceLog] = useState([]);
  const [budget, setBudget] = useState(null);
  const [budgetInput, setBudgetInput] = useState("");
  const [editingBudget, setEditingBudget] = useState(false);
  const [newItem, setNewItem] = useState({name:"",qty:1,price:"",section:"Produce"});
  const [view, setView] = useState("list");
  const [listCleared, setListCleared] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editValues, setEditValues] = useState({});
  const [customSection, setCustomSection] = useState("");
  const [showCustom, setShowCustom] = useState(false);
  const [sections, setSections] = useState(defaultSections);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        setItems(data.items||[]);
        setPriceLog(data.priceLog||[]);
        setSections(data.sections||defaultSections);
        setBudget(data.budget??null);
      }
    } catch(e){}
  },[]);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({items,priceLog,sections,budget}));
    } catch(e){}
  },[items,priceLog,sections,budget]);

  function addItem() {
    if (!newItem.name.trim()) return;
    const item = {
      id: generateId(),
      name: newItem.name.trim(),
      qty: Math.max(1,parseInt(newItem.qty)||1),
      price: newItem.price ? parseFloat(newItem.price) : null,
      section: newItem.section,
      checked: false,
      addedAt: new Date().toISOString(),
    };
    setItems(prev=>[...prev,item]);
    setNewItem(prev=>({...prev,name:"",qty:1,price:""}));
    setListCleared(false);
  }

  function toggleCheck(id) {
    setItems(prev => {
      const updated = prev.map(item => {
        if (item.id!==id) return item;
        const checked = !item.checked;
        if (checked && item.price!==null) {
          setPriceLog(log=>[...log,{
            id:generateId(),itemName:item.name,price:item.price,
            qty:item.qty,total:item.price*item.qty,
            date:new Date().toLocaleString(),section:item.section,
          }]);
        }
        return {...item,checked};
      });
      setTimeout(()=>{
        setItems(curr=>{
          const remaining = curr.filter(i=>!i.checked);
          if (remaining.length===0 && curr.length>0) setListCleared(true);
          return remaining;
        });
      },700);
      return updated;
    });
  }

  function startEdit(item) {
    setEditingId(item.id);
    setEditValues({name:item.name,qty:item.qty,price:item.price??"",section:item.section});
  }

  function saveEdit(id) {
    setItems(prev=>prev.map(item=>item.id===id?{
      ...item,
      name:editValues.name.trim()||item.name,
      qty:Math.max(1,parseInt(editValues.qty)||1),
      price:editValues.price!==""?parseFloat(editValues.price):null,
      section:editValues.section,
    }:item));
    setEditingId(null);
  }

  function deleteItem(id) {
    setItems(prev=>{
      const remaining=prev.filter(i=>i.id!==id);
      if(remaining.length===0&&prev.length>0) setListCleared(true);
      return remaining;
    });
  }

  function addSection() {
    if(customSection.trim()&&!sections.includes(customSection.trim())) {
      setSections(prev=>[...prev,customSection.trim()]);
      setNewItem(prev=>({...prev,section:customSection.trim()}));
    }
    setCustomSection(""); setShowCustom(false);
  }

  function saveBudget() {
    const val=parseFloat(budgetInput);
    if(!isNaN(val)&&val>0) setBudget(val);
    setEditingBudget(false); setBudgetInput("");
  }

  const totalEstimate = items.reduce((sum,i)=>sum+(i.price?i.price*i.qty:0),0);
  const grouped = sections.map(sec=>({section:sec,items:items.filter(i=>i.section===sec)})).filter(g=>g.items.length>0);
  const budgetRemaining = budget!==null ? budget-totalEstimate : null;
  const budgetPct = budget ? Math.min((totalEstimate/budget)*100,100) : 0;
  const budgetColor = budgetPct>90?"#e05a5a":budgetPct>70?"#e0a84a":"#6ecf74";
  const s = styles;

  return (
    <div style={s.root}>
      <div style={s.bg}/>
      <div style={s.container}>
        <div style={s.header}>
          <div>
            <div style={{fontSize:32,marginBottom:2}}>🛒</div>
            <h1 style={s.title}>Cart & Go</h1>
            <p style={s.subtitle}>Your smart grocery companion</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            <button style={s.navBtn} onClick={()=>setView(v=>v==="log"?"list":"log")}>
              {view==="log"?"← List":"📋 Log"}
            </button>
            <button style={s.navBtn} onClick={()=>setView(v=>v==="budget"?"list":"budget")}>
              {view==="budget"?"← List":"💰 Budget"}
            </button>
          </div>
        </div>

        {view==="log" && <PriceLog log={priceLog}/>}

        {view==="budget" && (
          <BudgetView
            budget={budget} budgetInput={budgetInput} setBudgetInput={setBudgetInput}
            editingBudget={editingBudget} setEditingBudget={setEditingBudget}
            saveBudget={saveBudget} totalEstimate={totalEstimate}
            budgetRemaining={budgetRemaining} budgetPct={budgetPct} budgetColor={budgetColor}
            priceLog={priceLog} sections={sections} onClearBudget={()=>setBudget(null)}
          />
        )}

        {view==="list" && (<>
          <div style={s.card}>
            <h2 style={s.cardTitle}>Add Item</h2>
            <div style={s.formGrid}>
              <input style={{...s.input,gridColumn:"1 / -1"}} placeholder="Item name (e.g. Whole Milk)"
                value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&addItem()}/>
              <div style={s.inputGroup}>
                <label style={s.label}>Qty</label>
                <input style={s.input} type="number" min="1" value={newItem.qty}
                  onChange={e=>setNewItem(p=>({...p,qty:e.target.value}))}/>
              </div>
              <div style={s.inputGroup}>
                <label style={s.label}>Price ($)</label>
                <input style={s.input} type="number" min="0" step="0.01" placeholder="0.00"
                  value={newItem.price} onChange={e=>setNewItem(p=>({...p,price:e.target.value}))}/>
              </div>
              <div style={{...s.inputGroup,gridColumn:"1 / -1"}}>
                <label style={s.label}>Section</label>
                <div style={{display:"flex",gap:6}}>
                  <select style={s.input} value={newItem.section}
                    onChange={e=>setNewItem(p=>({...p,section:e.target.value}))}>
                    {sections.map(sec=><option key={sec}>{sec}</option>)}
                  </select>
                  <button style={s.iconBtn} onClick={()=>setShowCustom(v=>!v)}>+</button>
                </div>
              </div>
            </div>
            {showCustom && (
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <input style={{...s.input,flex:1}} placeholder="New section name"
                  value={customSection} onChange={e=>setCustomSection(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addSection()}/>
                <button style={{...s.addBtn,marginTop:0,width:"auto",padding:"9px 16px"}} onClick={addSection}>Add</button>
              </div>
            )}
            <button style={s.addBtn} onClick={addItem}>＋ Add to List</button>
          </div>

          {budget!==null && items.length>0 && (
            <div style={s.budgetMini}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{color:"#9ecfa2",fontSize:13}}>Budget: ${budget.toFixed(2)}</span>
                <span style={{fontSize:13,color:budgetColor,fontWeight:700}}>
                  {budgetRemaining>=0?`$${budgetRemaining.toFixed(2)} left`:`$${Math.abs(budgetRemaining).toFixed(2)} over!`}
                </span>
              </div>
              <div style={s.progressTrack}>
                <div style={{...s.progressFill,width:`${budgetPct}%`,background:budgetColor}}/>
              </div>
            </div>
          )}

          {items.length>0 && (
            <div style={s.totalBar}>
              <span>Estimated Total</span>
              <span style={s.totalAmount}>{totalEstimate>0?`$${totalEstimate.toFixed(2)}`:"—"}</span>
            </div>
          )}

          {items.length===0 && (
            <div style={{textAlign:"center",padding:"40px 20px",color:"#5c7e60"}}>
              {listCleared?(
                <><div style={{fontSize:52}}>🎉</div>
                <p style={s.emptyTitle}>Shopping done!</p>
                <p style={s.emptyText}>Your list is clear. Check the price log to see what you spent.</p></>
              ):(
                <><div style={{fontSize:52}}>🛍️</div>
                <p style={s.emptyTitle}>List is empty</p>
                <p style={s.emptyText}>Add your first item above to get started.</p></>
              )}
            </div>
          )}

          {grouped.map(({section,items:secItems})=>(
            <div key={section} style={{marginBottom:6}}>
              <div style={s.sectionHeader}>{section}</div>
              {secItems.map(item=>(
                <GroceryItem key={item.id} item={item}
                  editing={editingId===item.id} editValues={editValues} sections={sections}
                  onToggle={()=>toggleCheck(item.id)} onEdit={()=>startEdit(item)}
                  onSave={()=>saveEdit(item.id)} onDelete={()=>deleteItem(item.id)}
                  onEditChange={vals=>setEditValues(v=>({...v,...vals}))}/>
              ))}
            </div>
          ))}
        </>)}
      </div>
    </div>
  );
}

function BudgetView({budget,budgetInput,setBudgetInput,editingBudget,setEditingBudget,
  saveBudget,totalEstimate,budgetRemaining,budgetPct,budgetColor,priceLog,sections,onClearBudget}) {
  const logTotal = priceLog.reduce((s,e)=>s+e.total,0);
  const bySection = sections.map(sec=>({
    section:sec,
    total:priceLog.filter(e=>e.section===sec).reduce((s,e)=>s+e.total,0)
  })).filter(s=>s.total>0).sort((a,b)=>b.total-a.total);
  const s = styles;

  return (
    <div>
      <div style={s.card}>
        <h2 style={s.cardTitle}>💰 My Budget</h2>
        {budget===null||editingBudget?(
          <div>
            <p style={{margin:"0 0 10px",fontSize:13,color:"#7a9e7e"}}>Set a spending limit for this shopping trip.</p>
            <div style={{display:"flex",gap:8}}>
              <input style={{...s.input,flex:1}} type="number" min="0" step="0.01" placeholder="e.g. 150.00"
                value={budgetInput} onChange={e=>setBudgetInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&saveBudget()} autoFocus/>
              <button style={{...s.addBtn,marginTop:0,width:"auto",padding:"9px 18px"}} onClick={saveBudget}>Save</button>
              {editingBudget&&(
                <button style={{...s.iconBtn,border:"1px solid rgba(255,255,255,0.1)",padding:"9px 12px"}}
                  onClick={()=>setEditingBudget(false)}>✕</button>
              )}
            </div>
          </div>
        ):(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div>
                <div style={s.budgetLabel}>Total Budget</div>
                <div style={s.budgetAmount}>${budget.toFixed(2)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={s.budgetLabel}>{budgetRemaining>=0?"Remaining":"Over Budget"}</div>
                <div style={{...s.budgetAmount,color:budgetColor}}>
                  {budgetRemaining>=0?`$${budgetRemaining.toFixed(2)}`:`-$${Math.abs(budgetRemaining).toFixed(2)}`}
                </div>
              </div>
            </div>
            <div style={{margin:"14px 0 6px"}}>
              <div style={s.progressTrack}>
                <div style={{...s.progressFill,width:`${budgetPct}%`,background:budgetColor,transition:"width 0.5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:11,color:"#5c7e60"}}>$0</span>
                <span style={{fontSize:12,color:budgetColor,fontWeight:600}}>{budgetPct.toFixed(0)}% used</span>
                <span style={{fontSize:11,color:"#5c7e60"}}>${budget.toFixed(2)}</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
              <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px"}}>
                <span style={{display:"block",fontSize:11,color:"#6b9e70",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>In Cart (Est.)</span>
                <span style={{display:"block",fontSize:18,fontWeight:700,color:"#b5deb8"}}>${totalEstimate.toFixed(2)}</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px"}}>
                <span style={{display:"block",fontSize:11,color:"#6b9e70",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:4}}>Logged Spend</span>
                <span style={{display:"block",fontSize:18,fontWeight:700,color:"#b5deb8"}}>${logTotal.toFixed(2)}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={{...s.addBtn,marginTop:0,flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)"}}
                onClick={()=>{setEditingBudget(true);setBudgetInput(budget.toString());}}>✏️ Edit</button>
              <button style={{...s.addBtn,marginTop:0,flex:1,background:"rgba(180,60,60,0.2)",border:"1px solid rgba(200,80,80,0.2)",color:"#e08080"}}
                onClick={onClearBudget}>🗑 Clear</button>
            </div>
          </div>
        )}
      </div>
      {bySection.length>0&&(
        <div style={s.card}>
          <h2 style={s.cardTitle}>Spend by Section</h2>
          {bySection.map(({section,total})=>{
            const pct=logTotal>0?(total/logTotal)*100:0;
            return (
              <div key={section} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,color:"#c8deca"}}>{section}</span>
                  <span style={{fontSize:13,fontWeight:600,color:"#9ecfa2"}}>${total.toFixed(2)}</span>
                </div>
                <div style={s.progressTrack}>
                  <div style={{...s.progressFill,width:`${pct}%`,background:"#4a9e56"}}/>
                </div>
                <div style={{fontSize:11,color:"#4a6b4e",marginTop:2}}>{pct.toFixed(0)}% of total logged</div>
              </div>
            );
          })}
        </div>
      )}
      {bySection.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:"#5c7e60"}}>
          <div style={{fontSize:40}}>📊</div>
          <p style={{margin:"12px 0 4px",fontSize:18,color:"#7aab7e",fontWeight:600}}>No spend data yet</p>
          <p style={{margin:0,fontSize:14,color:"#5c7e60",lineHeight:1.6}}>Check off priced items and spending breakdowns will appear here.</p>
        </div>
      )}
    </div>
  );
}

function GroceryItem({item,editing,editValues,sections,onToggle,onEdit,onSave,onDelete,onEditChange}) {
  const s = styles;
  return (
    <div style={{...s.item,opacity:item.checked?0.4:1,transition:"opacity 0.6s"}}>
      {editing?(
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <input style={{...s.input,flex:2}} value={editValues.name} onChange={e=>onEditChange({name:e.target.value})}/>
          <input style={{...s.input,width:56}} type="number" min="1" value={editValues.qty} onChange={e=>onEditChange({qty:e.target.value})}/>
          <input style={{...s.input,width:72}} type="number" min="0" step="0.01" placeholder="Price" value={editValues.price} onChange={e=>onEditChange({price:e.target.value})}/>
          <select style={s.input} value={editValues.section} onChange={e=>onEditChange({section:e.target.value})}>
            {sections.map(sec=><option key={sec}>{sec}</option>)}
          </select>
          <button style={s.saveBtn} onClick={onSave}>✓</button>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button style={s.checkbox} onClick={onToggle}>{item.checked?"✅":"⬜"}</button>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:1}}>
            <span style={{fontSize:15,color:"#e8f5e9",fontWeight:500,textDecoration:item.checked?"line-through":"none"}}>{item.name}</span>
            <span style={{fontSize:12,color:"#6b9e70"}}>x{item.qty}{item.price!=null?` · $${(item.price*item.qty).toFixed(2)}`:""}</span>
          </div>
          <div style={{display:"flex",gap:2}}>
            <button style={s.iconBtn} onClick={onEdit}>✏️</button>
            <button style={{...s.iconBtn,color:"#e55"}} onClick={onDelete}>🗑</button>
          </div>
        </div>
      )}
    </div>
  );
}

function PriceLog({log}) {
  const s = styles;
  const total = log.reduce((sum,e)=>sum+e.total,0);
  return (
    <div style={s.card}>
      <h2 style={s.cardTitle}>📋 Price Log</h2>
      {log.length===0?(
        <p style={{margin:0,fontSize:14,color:"#5c7e60",lineHeight:1.6}}>No purchases logged yet. Check off items with prices to record them here.</p>
      ):(
        <>
          <div style={{fontSize:15,color:"#9ecfa2",background:"rgba(45,90,48,0.25)",borderRadius:8,padding:"10px 14px"}}>
            All-time total: <strong>${total.toFixed(2)}</strong>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
            {[...log].reverse().map(entry=>(
              <div key={entry.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px",display:"grid",gridTemplateColumns:"1fr auto",gridTemplateRows:"auto auto",gap:"2px 8px"}}>
                <div style={{fontSize:14,fontWeight:600,color:"#e8f5e9"}}>{entry.itemName}</div>
                <div style={{fontSize:12,color:"#6b9e70",gridColumn:1}}>{entry.section} · x{entry.qty}</div>
                <div style={{fontSize:11,color:"#4a6b4e",gridColumn:1}}>{entry.date}</div>
                <div style={{fontSize:18,fontWeight:700,color:"#9ecfa2",gridRow:"1 / 3",gridColumn:2,display:"flex",alignItems:"center"}}>${entry.total.toFixed(2)}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

const styles = {
  root:{minHeight:"100vh",background:"#0f1117",position:"relative",fontFamily:"Georgia,serif",color:"#f0ede6"},
  bg:{position:"fixed",inset:0,background:"radial-gradient(ellipse at 20% 20%, #1a2a1a 0%, #0f1117 60%), radial-gradient(ellipse at 80% 80%, #1a1a2e 0%, transparent 60%)",zIndex:0,pointerEvents:"none"},
  container:{position:"relative",zIndex:1,maxWidth:560,margin:"0 auto",padding:"24px 16px 48px"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28},
  title:{margin:0,fontSize:32,fontWeight:700,letterSpacing:"-0.5px",color:"#e8f5e9"},
  subtitle:{margin:"2px 0 0",fontSize:13,color:"#6b9e70",letterSpacing:"0.5px"},
  navBtn:{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#b0c9b2",borderRadius:10,padding:"7px 12px",fontSize:13,cursor:"pointer",whiteSpace:"nowrap"},
  card:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:16,padding:"20px",marginBottom:18},
  cardTitle:{margin:"0 0 14px",fontSize:15,fontWeight:600,color:"#9ecfa2",textTransform:"uppercase",letterSpacing:"1px"},
  formGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  inputGroup:{display:"flex",flexDirection:"column",gap:4},
  label:{fontSize:11,color:"#7a9e7e",textTransform:"uppercase",letterSpacing:"0.5px"},
  input:{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 12px",color:"#f0ede6",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"},
  addBtn:{marginTop:12,width:"100%",background:"linear-gradient(135deg,#2d5a30,#3d7a42)",border:"none",borderRadius:10,padding:"12px",color:"#e8f5e9",fontSize:15,fontWeight:600,cursor:"pointer"},
  iconBtn:{background:"transparent",border:"none",cursor:"pointer",fontSize:16,padding:"4px 6px",borderRadius:6,color:"#a0b8a2",lineHeight:1},
  saveBtn:{background:"#2d5a30",border:"none",borderRadius:8,padding:"8px 12px",color:"#e8f5e9",fontWeight:700,cursor:"pointer",fontSize:16},
  totalBar:{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(45,90,48,0.3)",border:"1px solid rgba(100,180,110,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:14,color:"#9ecfa2"},
  totalAmount:{fontSize:20,fontWeight:700,color:"#b5deb8"},
  budgetMini:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 14px",marginBottom:10},
  progressTrack:{width:"100%",height:8,background:"rgba(255,255,255,0.08)",borderRadius:99,overflow:"hidden"},
  progressFill:{height:"100%",borderRadius:99},
  budgetLabel:{fontSize:11,color:"#6b9e70",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2},
  budgetAmount:{fontSize:28,fontWeight:700,color:"#e8f5e9",lineHeight:1},
  sectionHeader:{fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",color:"#5c7e60",padding:"8px 4px 4px",fontWeight:600},
